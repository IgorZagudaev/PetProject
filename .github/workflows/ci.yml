name: Investment CI

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - '../../_docs/**'
  pull_request:
    branches: [ "main", "master" ]

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.6'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────
  # 1. Сборка и тесты (Unit + Integration)
  # ─────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      # PostgreSQL для auth-service
      postgres-auth:
        image: postgres:15
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1131
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      # PostgreSQL для portfolio-service
      postgres-portfolio:
        image: postgres:15
        env:
          POSTGRES_DB: portfolio_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1131
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5435:5432

      # Redis
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6679:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven (skip tests first for faster feedback)
        run: mvn -B clean compile -DskipTests

      - name: Run Unit Tests
        run: mvn -B test

      - name: Run Integration Tests (with Testcontainers)
        run: mvn -B verify -Pintegration-test
        env:
          # Переопределяем порты для тестов, если используете Testcontainers
          SPRING_DATASOURCE_URL_AUTH: jdbc:postgresql://localhost:5433/auth_db
          SPRING_DATASOURCE_URL_PORTFOLIO: jdbc:postgresql://localhost:5435/portfolio_db
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6679

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/'

  # ─────────────────────────────────────
  # 2. Сборка Docker-образов (только на main/тегах)
  # ─────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build JARs with Maven
        run: mvn -B clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Auth Service ──
      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./auth-service/_docker/auth-service.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Portfolio Service ──
      - name: Build and push portfolio-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./portfolio-service/_docker/portfolio-service.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portfolio-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── API Gateway ──
      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api-gateway/_docker/api-gateway.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────
  # 3. Проверка качества кода (опционально)
  # ─────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      - name: Run Spotless/Checkstyle
        run: mvn -B spotless:check checkstyle:check
        continue-on-error: true  # Не блокировать CI, если стиль не идеален