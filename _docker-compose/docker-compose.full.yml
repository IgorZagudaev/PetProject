services:
  # Базы данных
  postgres-auth:
    image: postgres:15
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1131
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-portfolio:
    image: postgres:15
    container_name: postgres-portfolio
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1131
    ports:
      - "5435:5432"
    volumes:
      - postgres_portfolio_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Общий Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6679:6379"
    volumes:
      - redis_data:/data

  # Сервисы
  auth-service:
    build:
      context: ..
      dockerfile: ./auth-service/_docker/auth-service.Dockerfile
    container_name: auth-service
    ports:
      - "8080:8080"
      - "9090:9090"  # Actuator
    depends_on:
      postgres-auth:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - AUTH_PORTFOLIO=http://portfolio-service:8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-auth:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=1131


  portfolio-service:
    build:
      context: ..
      dockerfile: ./portfolio-service/_docker/portfolio-service.Dockerfile
    container_name: portfolio-service
    ports:
      - "8082:8082"
      - "9092:9092"  # Actuator
    depends_on:
      postgres-portfolio:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-portfolio:5432/portfolio_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=1131
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379


  api-gateway:
    build:
      context: ..
      dockerfile: ./api-gateway/_docker/api-gateway.Dockerfile
    container_name: api-gateway
    ports:
      - "8081:8081"
      - "9091:9091"  # Actuator
    depends_on:
      redis:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - AUTH_SERVICE=http://auth-service:8080
      - AUTH_PORTFOLIO=http://portfolio-service:8082
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379

volumes:
  postgres_portfolio_data:
  postgres_auth_data:
  redis_data:

networks:
  default:
    name: investment-net