version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: redis-api-gateway
    ports:
      - "6679:6379"
    volumes:
      - redis_data:/data

  api-gateway:
    build:
      context: ../..        # 2 уровня вверх до investment-platform/
      dockerfile: ./api-gateway/_docker/api-gateway.Dockerfile
    container_name: api-gateway
    ports:
      - "8081:8081"
      - "9091:9091"  # Actuator
    depends_on:
      redis:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379


volumes:
  redis_data: