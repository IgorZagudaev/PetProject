server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 10000
        response-timeout: 30s
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE:http://localhost:8080}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10    # Скорость пополнения токенов (в сек)
                redis-rate-limiter.burstCapacity: 20    # Максимальное количество токенов
                redis-rate-limiter.requestedTokens: 1   # Токенов на запрос
                key-resolver: "#{@userKeyResolver}"     # Бин для определения ключа
        - id: user-service
          uri: ${AUTH_PORTFOLIO:http://localhost:8082}
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1    # Скорость пополнения токенов (в сек)
                redis-rate-limiter.burstCapacity: 10    # Максимальное количество токенов
                redis-rate-limiter.requestedTokens: 1   # Токенов на запрос
                key-resolver: "#{@compositeKeyResolver}"     # Бин для определения ключа

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      database: 0
      timeout: 5000ms

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.data.redis: DEBUG
    ru.samara.pet.api_gateway.config: DEBUG

# actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"  # может: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  server:
    port: 9091  # отдельный порт для мониторинга

# swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: true