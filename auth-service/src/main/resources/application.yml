server:
  port: 8080
spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: event:ru.samara.pet.auth_service.model.dto.RegisterRequest
    consumer:
      group-id: ${spring.application.name:-default-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: ru.samara.pet.auth_service.model.dto
        spring.json.type.mapping: event:ru.samara.pet.auth_service.model.dto.RegisterRequest
  threads:
    virtual:
      enabled: true  # для Tomcat
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1131}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate  # Только проверка структуры
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    flyway:
      enabled: true
      baseline-on-migrate: true  # если БД уже существовала

app:
  jwt:
    secret: l3eAT2bjCIsQ2mlDQVoIEBZZyWk4YqFaUqf6pUIvWKQ=
    expiration-ms: 86400000  # 24 часа

services:
  notification:
    url: ${AUTH_PORTFOLIO:http://localhost:8082}  # URL сервиса работы с кошельком

management:
  endpoints:
    web:
      exposure:
        include: "*"  # может: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  server:
    port: 9090  # отдельный порт для мониторинга


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: true
